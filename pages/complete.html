<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complétez votre profil - REWEAR DZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/signin.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../script/auth.js"></script>
</head>

<body>

    <div class="login-container">
        <div class="login-box">
            <h2>Complétez votre profil</h2>
            <p style="color: var(--muted); margin-bottom: 20px; font-size: 14px;">
                Dernière étape ! 🎉
            </p>

            <form id="profileForm">
                <input type="text" id="username" placeholder="username" required>

                <select id="sexe" required
                    style="width: 100%; padding: 14px 16px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--beige-dark); background-color: var(--white); color: var(--text); font-size: 14px;">
                    <option value="">Sexe</option>
                    <option value="homme">Homme</option>
                    <option value="femme">Femme</option>
                </select>
                <select id="wilaya" required
                    style="width: 100%; padding: 14px 16px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--beige-dark); background-color: var(--white); color: var(--text); font-size: 14px;">
                    <option value="">Wilaya</option>
                    <option>Adrar</option><option>Chlef</option><option>Laghouat</option>
                    <option>Oum El Bouaghi</option><option>Batna</option><option>Bejaia</option>
                    <option>Biskra</option><option>Bechar</option><option>Blida</option>
                    <option>Bouira</option><option>Tamanrasset</option><option>Tebessa</option>
                    <option>Tlemcen</option><option>Tiaret</option><option>Tizi Ouzou</option>
                    <option>Alger</option><option>Djelfa</option><option>Jijel</option>
                    <option>Setif</option><option>Saida</option><option>Skikda</option>
                    <option>Sidi Bel Abbes</option><option>Annaba</option><option>Guelma</option>
                    <option>Constantine</option><option>Medea</option><option>Mostaganem</option>
                    <option>M'Sila</option><option>Mascara</option><option>Ouargla</option>
                    <option>Oran</option><option>El Bayadh</option><option>Illizi</option>
                    <option>Bordj Bou Arreridj</option><option>Boumerdes</option><option>El Tarf</option>
                    <option>Tindouf</option><option>Tissemsilt</option><option>El Oued</option>
                    <option>Khenchela</option><option>Souk Ahras</option><option>Tipaza</option>
                    <option>Mila</option><option>Ain Defla</option><option>Naama</option>
                    <option>Ain Temouchent</option><option>Ghardaia</option><option>Relizane</option>
                    <option>Timimoun</option><option>Bordj Badji Mokhtar</option>
                    <option>Ouled Djellal</option><option>Beni Abbes</option><option>In Salah</option>
                    <option>In Guezzam</option><option>Touggourt</option><option>Djanet</option>
                    <option>El M'Ghair</option><option>El Meniaa</option>
                </select>

                <input type="text" id="instagram" placeholder="Instagram">
                <input type="text" id="facebook" placeholder="Facebook">
                <input type="tel" id="numero" placeholder="Ex: 0555123456 ou +213555123456">

                <p class="form-error" id="formError" style="display:none;"></p>

                <button type="submit" class="login-btn">Continuer</button>
            </form>
        </div>
    </div>


    <script>
        function isValidPhone(v) {
            return /^(0\d{9}|\+213\d{9})$/.test(String(v || '').trim());
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const sexe = document.getElementById('sexe').value;
            const wilaya = document.getElementById('wilaya').value;
            const instagram = document.getElementById('instagram').value;
            const facebook = document.getElementById('facebook').value;
            const numero = document.getElementById('numero').value.trim();
            const errEl = document.getElementById('formError');
            errEl.style.display = 'none';

            if (numero && !isValidPhone(numero)) {
                errEl.textContent = 'Numéro invalide. Utilisez le format 0XXXXXXXXX ou +213XXXXXXXXX, sans espaces.';
                errEl.style.display = 'block';
                return;
            }

            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                alert('❌ Non connecté');
                window.location.href = './login.html';
                return;
            }

            // Le nom affiché partout ailleurs (header, annonces...) vient de
            // user_metadata.username, donc c'est là qu'il doit être écrit.
            const { error: authError } = await supabaseClient.auth.updateUser({
                data: { username: username }
            });

            // Le reste des infos de profil vit dans la table "profiles" (pas "users",
            // qui n'existe nulle part ailleurs dans le site — c'était le bug qui
            // empêchait cette étape de fonctionner et bloquait les nouveaux inscrits).
            const { error } = await supabaseClient
                .from('profiles')
                .update({
                    username: username,
                    sexe: sexe,
                    wilaya: wilaya,
                    instagram: instagram,
                    facebook: facebook,
                    phone: numero,
                    profile_completed: true
                })
                .eq('id', user.id);

            if (error || authError) {
                console.error('Erreur:', error || authError);
                if (error && error.code === '23505') {
                    errEl.textContent = 'Ce numéro de téléphone est déjà utilisé par un autre compte.';
                    errEl.style.display = 'block';
                    return;
                }
                alert('❌ Erreur : ' + ((error || authError).message || 'inconnue') +
                      '\n\nSi ça mentionne une colonne qui n\'existe pas sur "profiles", dis-le moi pour que j\'ajuste.');
                return;
            }

            localStorage.setItem('user', JSON.stringify({ id: user.id, username: username }));
            window.location.href = '../index.html';
        });
    </script>

</body>

</html>
