<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signalements - Admin REWEAR DZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="styles/signalements.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">⚙️ Admin Panel</div>
    <a href="index.html"        class="nav-item"><span>🏠</span> Dashboard</a>
    <a href="users.html"        class="nav-item"><span>👥</span> Utilisateurs</a>
    <a href="articles.html"     class="nav-item"><span>👗</span> Annonces</a>
    <a href="signalements.html" class="nav-item active"><span>🚩</span> Signalements</a>
    <div class="sidebar-bottom">
      <a href="../../index.html" class="nav-item" style="margin-bottom:0.5rem;"><span>←</span> Retour au site</a>
      <button class="btn-logout-admin" id="btnLogout">Déconnexion</button>
    </div>
  </aside>

  <main class="admin-main">
    <h1>🚩 Signalements</h1>

    <div class="filters">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 Rechercher...">
      <select class="filter-select" id="filterMotif">
        <option value="">Tous les motifs</option>
        <option value="arnaque">Arnaque</option>
        <option value="faux_article">Faux article</option>
        <option value="comportement">Comportement</option>
        <option value="spam">Spam</option>
        <option value="autre">Autre</option>
      </select>
      <span class="count-label" id="countLabel">—</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Vendeur signalé</th>
            <th>Signalé par</th>
            <th>Motif</th>
            <th>Commentaire</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" class="loading-msg">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal ban -->
<div class="modal-bg" id="modalBan">
  <div class="modal">
    <h3>🚫 Bannir ce vendeur</h3>
    <label>Raison du ban</label>
    <textarea id="banReason" placeholder="Ex: arnaque confirmée, faux compte..."></textarea>
    <div class="modal-actions">
      <button class="btn-confirm-ban" id="btnConfirmBan">Bannir définitivement</button>
      <button class="btn-cancel" id="btnCancelBan">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script/admin-guard.js"></script>
<script src="script/signalements.js"></script>
</body>
</html>
