<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilisateurs - Admin REWEAR DZ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <link rel="stylesheet" href="styles/users.css">
</head>
<body>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Admin Panel</div>
    <a href="index.html"        class="nav-item"><span>&#8962;</span> Dashboard</a>
    <a href="users.html"        class="nav-item active"><span>&#128101;</span> Utilisateurs</a>
    <a href="articles.html"     class="nav-item"><span>&#128717;</span> Annonces</a>
    <a href="signalements.html" class="nav-item"><span>&#9873;</span> Signalements</a>
    <div class="sidebar-bottom">
      <a href="../../index.html" class="nav-item" style="margin-bottom:0.5rem;"><span>&#8592;</span> Retour au site</a>
      <button class="btn-logout-admin" id="btnLogout">Deconnexion</button>
    </div>
  </aside>

  <main class="admin-main">
    <h1>Utilisateurs</h1>
    <div class="filters">
      <input type="text" class="search-input" id="searchInput" placeholder="Rechercher un utilisateur...">
      <select class="filter-select" id="filterRole">
        <option value="">Tous les roles</option>
        <option value="admin">Admin</option>
        <option value="user">User</option>
        <option value="banni">Bannis</option>
      </select>
      <span class="count-label" id="countLabel">—</span>
    </div>

    <div class="table-wrap">
      <table>
  <thead>
  <tr>
    <th>Utilisateur</th>
    <th>Email</th>
    <th>Telephone</th>
    <th>Instagram</th>
    <th>Statut</th>
    <th>Inscrit le</th>
    <th>Actions</th>
  </tr>
</thead>
        <tbody id="tableBody">
          <tr><td colspan="7" class="loading-msg">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal raison du ban -->
<div class="modal-bg" id="modalBan">
  <div class="modal">
    <h3>Bannir cet utilisateur definitivement</h3>
    <label>Raison du ban</label>
    <textarea id="banReason" placeholder="Ex: arnaque confirmee, faux compte..."></textarea>
    <div class="modal-actions">
      <button class="btn-confirm-ban" id="btnConfirmBan">Bannir definitivement</button>
      <button class="btn-cancel" id="btnCancelBan">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script/admin-guard.js"></script>
<script src="script/users.js"></script>
</body>
</html>
