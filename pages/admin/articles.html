<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annonces - Admin REWEAR DZ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="styles/articles.css">
</head>
<body>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">⚙️ Admin Panel</div>
    <a href="index.html"        class="nav-item"><span>🏠</span> Dashboard</a>
    <a href="users.html"        class="nav-item"><span>👥</span> Utilisateurs</a>
    <a href="articles.html"     class="nav-item active"><span>👗</span> Annonces</a>
    <a href="signalements.html" class="nav-item"><span>🚩</span> Signalements</a>
    <div class="sidebar-bottom">
      <a href="../../index.html" class="nav-item" style="margin-bottom:0.5rem;"><span>←</span> Retour au site</a>
      <button class="btn-logout-admin" id="btnLogout">Déconnexion</button>
    </div>
  </aside>

  <main class="admin-main">
    <h1>👗 Annonces</h1>

    <div class="filters">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 Rechercher une annonce...">
      <select class="filter-select" id="filterStatus">
        <option value="">Toutes</option>
        <option value="active">Actives</option>
        <option value="inactive">Inactives</option>
      </select>
      <span class="count-label" id="countLabel">—</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Photo</th>
            <th>Titre</th>
            <th>Prix</th>
            <th>État</th>
            <th>Statut</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7" class="loading-msg">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script/admin-guard.js"></script>
<script src="script/articles.js"></script>
</body>
</html>
