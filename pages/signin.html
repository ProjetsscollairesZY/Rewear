<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S'inscrire - REWEAR DZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/signin.css">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<a href="../index.html" class="back-home">← Retour à l'accueil</a>

<div class="login-container">
  <div class="login-box">
    <h2>Créer un compte</h2>
    <p id="signupError" class="form-error" style="display:none;"></p>
    <form id="signupForm">
      <input type="text" id="username" placeholder="Nom d'utilisateur" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Mot de passe" required minlength="6">
      <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required>
      <div class="recaptcha-wrap">
        <div class="g-recaptcha" data-sitekey="6Le4dIEsAAAAANj3lcKG1AYeL26DYNVQnqt6mMgC"></div>
      </div>
      <button type="submit" class="login-btn">S'inscrire</button>
    </form>
    <p class="signup-text">Déjà inscrit ? <a href="./login.html">Se connecter</a></p>
  </div>
</div>

<script src="../script/auth.js"></script>
<script>
  window.showAuthError = function(msg) {
    var el = document.getElementById('signupError');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
  };
  window.showAuthSuccess = function(msg) {
    var el = document.getElementById('signupError');
    if (el) { el.style.display = 'none'; }
    alert(msg);
  };
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    var errEl = document.getElementById('signupError');
    errEl.style.display = 'none';
    if (document.getElementById('password').value !== document.getElementById('confirmPassword').value) {
      errEl.textContent = 'Les mots de passe ne correspondent pas.';
      errEl.style.display = 'block';
      return;
    }
    if (document.getElementById('password').value.length < 6) {
      errEl.textContent = 'Le mot de passe doit avoir au moins 6 caractères.';
      errEl.style.display = 'block';
      return;
    }
    var token = typeof grecaptcha !== 'undefined' ? grecaptcha.getResponse() : '';
    if (!token) {
      errEl.textContent = 'Veuillez cocher la case reCAPTCHA.';
      errEl.style.display = 'block';
      return;
    }
    if (token && window.verifyRecaptcha) {
      var ok = await window.verifyRecaptcha(token);
      if (!ok) {
        errEl.textContent = 'Vérification de sécurité échouée. Cochez la case et réessayez.';
        errEl.style.display = 'block';
        return;
      }
    }
    var username = document.getElementById('username').value;
    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;
    var success = await signup(email, password, username);
    if (success) {
      errEl.style.display = 'none';
      errEl.textContent = '';
      setTimeout(function() { window.location.href = './login.html'; }, 2000);
    }
    if (typeof grecaptcha !== 'undefined' && grecaptcha.reset) grecaptcha.reset();
  });
</script>

</body>
</html>
