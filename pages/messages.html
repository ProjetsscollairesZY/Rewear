<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - REWEAR DZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/index.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="styles/messages.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="../index.html" class="logo gradient-text">REWEAR DZ</a>
    <div class="nav-right">
      <div class="only-guest" id="guest-nav">
        <a href="login.html" class="nav-btn">Se connecter</a>
        <a href="signin.html" class="nav-btn btn-primary">S'inscrire</a>
      </div>
      <div class="only-auth" id="auth-nav">
        <a href="admin/index.html" id="admin-link" style="display:none;" class="nav-btn">Administration</a>
        <a href="../roles/vendeur/publier.html" class="btn-publish">+ Publier</a>
        <div class="user-menu">
          <div class="user-avatar" id="avatar-btn">?</div>
          <div class="dropdown" id="dropdown">
            <div class="dropdown-header">
              <div class="username" id="dd-username">Chargement...</div>
              <div class="user-rating" id="dd-rating"></div>
            </div>
            <a href="profile.html"><span class="icon">👤</span> Mon profil</a>
            <a href="myarticles.html"><span class="icon">📦</span> Mes annonces</a>
            <a href="messages.html"><span class="icon">💬</span> Messages<span class="nav-msg-badge" id="navMsgBadge" style="display:none;"></span></a>
            <button class="dd-item logout-btn" id="logout-btn">
              <span class="icon">🚪</span> Se déconnecter
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="msg-page" id="msgPage">

    <!-- LISTE DES CONVERSATIONS -->
    <div class="conv-list" id="convList">
      <div class="conv-list-header">
        <h1>💬 Messages</h1>
      </div>
      <div class="conv-items" id="convItems">
        <div class="loading-msg">Chargement des conversations...</div>
      </div>
      <div class="conv-empty" id="convEmpty" style="display:none;">
        <p>Aucune conversation pour le moment.</p>
        <a href="../index.html" class="back-link">← Parcourir les annonces</a>
      </div>
    </div>

    <!-- FIL DE DISCUSSION -->
    <div class="thread-view" id="threadView">
      <div class="thread-placeholder" id="threadPlaceholder">
        <div class="placeholder-icon">💬</div>
        <p>Sélectionnez une conversation pour l'afficher ici.</p>
      </div>

      <div class="thread-active" id="threadActive" style="display:none;">
        <div class="thread-header">
          <button class="btn-thread-back" id="btnThreadBack">←</button>
          <a class="thread-user" id="threadUserLink" href="#">
            <div class="thread-avatar" id="threadAvatar">?</div>
            <div class="thread-user-info">
              <div class="thread-username" id="threadUsername">—</div>
              <div class="thread-article" id="threadArticle"></div>
            </div>
          </a>
        </div>
        <div class="thread-messages" id="threadMessages"></div>
        <form class="thread-input-row" id="threadForm">
          <input type="text" id="threadInput" placeholder="Écrire un message..." maxlength="1000" autocomplete="off">
          <button type="submit" id="threadSend">Envoyer</button>
        </form>
      </div>
    </div>

  </div>

  <script src="../script/auth.js"></script>
  <script src="../script/messages.js"></script>
</body>
</html>
