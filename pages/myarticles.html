<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes annonces - REWEAR DZ</title>
  <link rel="stylesheet" href="../styles/index.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── PAGE ── */
    .dashboard-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #d4a574, #f4e5c2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .back-link {
      font-size: 0.85rem;
      color: #c89b5f;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .back-link:hover { color: #f4e5c2; }
    .btn-publish-top {
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #d4a574, #f4e5c2);
      color: #3d2817;
      font-weight: 700;
      font-size: 0.85rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .stat-pill {
      flex: 1;
      min-width: 120px;
      background: rgba(61, 40, 23, 0.75);
      border: 1px solid rgba(212, 165, 116, 0.2);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      backdrop-filter: blur(6px);
    }
    .stat-pill .num {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #d4a574, #f4e5c2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .stat-pill .lbl { font-size: 0.75rem; color: #c89b5f; margin-top: 0.25rem; }

    /* ── FILTER TABS ── */
    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(212, 165, 116, 0.35);
      background: transparent;
      color: #c89b5f;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn.active, .tab-btn:hover {
      background: rgba(212, 165, 116, 0.18);
      color: #f4e5c2;
    }
    .tab-btn.active {
      border-color: rgba(212, 165, 116, 0.7);
    }

    /* ── LIST ── */
    .my-list { display: flex; flex-direction: column; gap: 0.85rem; }

    .my-card {
      display: flex;
      gap: 1rem;
      align-items: center;
      background: rgba(61, 40, 23, 0.75);
      border: 1px solid rgba(212, 165, 116, 0.18);
      border-radius: 14px;
      padding: 1rem;
      backdrop-filter: blur(6px);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .my-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .my-card.inactive { opacity: 0.55; }

    .my-card img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
      border: 1px solid rgba(212, 165, 116, 0.15);
    }

    .card-infos { flex: 1; min-width: 0; }
    .card-infos h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #f4e5c2;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-infos .etat {
      font-size: 0.78rem;
      color: #c89b5f;
      margin-bottom: 0.4rem;
    }
    .card-status {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }
    .card-status.active-badge {
      background: rgba(92, 184, 92, 0.2);
      color: #7dd87d;
      border: 1px solid rgba(92, 184, 92, 0.35);
    }
    .card-status.inactive-badge {
      background: rgba(200, 155, 95, 0.15);
      color: #c89b5f;
      border: 1px solid rgba(200, 155, 95, 0.3);
    }

    .card-price {
      font-size: 1.05rem;
      font-weight: 800;
      color: #d4a574;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-actions {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .btn-toggle, .btn-delete {
      padding: 0.4rem 0.85rem;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn-toggle {
      background: rgba(212, 165, 116, 0.15);
      border-color: rgba(212, 165, 116, 0.35);
      color: #d4a574;
    }
    .btn-toggle:hover { background: rgba(212, 165, 116, 0.28); }
    .btn-toggle.deactivate {
      background: rgba(92, 184, 92, 0.12);
      border-color: rgba(92, 184, 92, 0.3);
      color: #7dd87d;
    }
    .btn-delete {
      background: rgba(220, 80, 80, 0.12);
      border-color: rgba(220, 80, 80, 0.3);
      color: #e07070;
    }
    .btn-delete:hover { background: rgba(220, 80, 80, 0.22); }

    /* ── EMPTY ── */
    .empty-dash {
      text-align: center;
      padding: 3rem 1rem;
      color: #c89b5f;
      display: none;
    }
    .empty-dash .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-dash p { margin-bottom: 1rem; font-size: 0.9rem; }
/* ── INTERESTS ── */
.interests-bar {
  margin-top: 0.85rem;
  border-top: 1px solid rgba(212, 165, 116, 0.12);
  padding-top: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.interest-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.3rem 0.85rem;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid rgba(212,165,116,0.35);
  background: rgba(212,165,116,0.1);
  color: #d4a574;
  transition: 0.2s;
}
.interest-badge.has-new {
  background: rgba(212,165,116,0.22);
  border-color: rgba(212,165,116,0.7);
  color: #f4e5c2;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(212,165,116,0.4); }
  50%      { box-shadow: 0 0 0 5px rgba(212,165,116,0); }
}
.interest-badge:hover { background: rgba(212,165,116,0.28); }
.interests-panel {
  margin-top: 0.75rem;
  display: none;
  flex-direction: column;
  gap: 0.6rem;
}
.interests-panel.open { display: flex; }
.interest-item {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.75rem;
  background: rgba(81,54,32,0.5);
  border: 1px solid rgba(212,165,116,0.12);
  border-radius: 10px;
  padding: 0.75rem 1rem;
  flex-wrap: wrap;
}
.interest-item.unread { border-color: rgba(212,165,116,0.45); }
.interest-item-info { flex: 1; min-width: 0; }
.interest-name { font-size: 0.88rem; font-weight: 700; color: #f4e5c2; margin-bottom: 0.2rem; }
.interest-contact { font-size: 0.78rem; color: #c89b5f; margin-bottom: 0.2rem; }
.interest-msg { font-size: 0.8rem; color: #a07850; font-style: italic; }
.interest-date { font-size: 0.7rem; color: #a07850; white-space: nowrap; }
.btn-mark-read {
  padding: 0.3rem 0.75rem;
  border-radius: 8px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid rgba(92,184,92,0.35);
  background: rgba(92,184,92,0.1);
  color: #7dd87d;
  white-space: nowrap;
  transition: 0.2s;
  flex-shrink: 0;
}
.btn-mark-read:hover { background: rgba(92,184,92,0.22); }
.no-interests { font-size: 0.82rem; color: #a07850; text-align: center; padding: 0.75rem; }
    /* ── ERROR ── */
    .form-error {
      color: #e07070;
      font-size: 0.875rem;
      background: rgba(220, 80, 80, 0.1);
      border: 1px solid rgba(220, 80, 80, 0.3);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      display: none;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: rgba(61, 40, 23, 0.97);
      border: 1px solid rgba(212, 165, 116, 0.4);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      color: #f4e5c2;
      font-size: 0.875rem;
      font-weight: 600;
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(92, 184, 92, 0.5); }
    .toast.error   { border-color: rgba(220, 80, 80, 0.5); color: #e07070; }

    /* ── LOADING ── */
    .loading-msg {
      text-align: center;
      color: #c89b5f;
      padding: 2rem;
      font-size: 0.9rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .my-card { flex-wrap: wrap; }
      .card-actions { flex-direction: row; width: 100%; }
      .btn-toggle, .btn-delete { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo gradient-text">REWEAR DZ</div>
    <div class="nav-right">
      <a href="../index.html" class="nav-btn">Accueil</a>
      <a href="../roles/vendeur/publier.html" class="btn-primary nav-btn">+ Publier</a>
    </div>
  </header>

  <div class="dashboard-wrap">

    <!-- PAGE HEADER -->
    <div>
      <a href="../index.html" class="back-link">← Retour à l'accueil</a>
    </div>
    <div class="page-header">
      <h1>🛍️ Mes annonces</h1>
      <a href="../roles/vendeur/publier.html" class="btn-publish-top">+ Nouvelle annonce</a>
    </div>

    <p id="dashError" class="form-error"></p>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-pill"><div class="num" id="statTotal">—</div><div class="lbl">Total</div></div>
      <div class="stat-pill"><div class="num" id="statActive">—</div><div class="lbl">Actives</div></div>
      <div class="stat-pill"><div class="num" id="statInactive">—</div><div class="lbl">Inactives</div></div>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="tab-btn active" data-filter="all">Toutes</button>
      <button class="tab-btn" data-filter="active">Actives</button>
      <button class="tab-btn" data-filter="inactive">Inactives</button>
    </div>

    <!-- LIST -->
    <div id="myList" class="my-list">
      <div class="loading-msg">Chargement de vos annonces...</div>
    </div>

    <!-- EMPTY -->
    <div id="emptyDash" class="empty-dash">
      <div class="empty-icon">👗</div>
      <p>Vous n'avez pas encore d'annonces publiées.</p>
      <a href="../roles/vendeur/publier.html" class="btn-publish-top">Publier ma première annonce</a>
    </div>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="../script/auth.js"></script>
  <script src="../script/myarticles.js"></script>
</body>
</html>
