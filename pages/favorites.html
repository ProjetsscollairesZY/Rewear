<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes favoris - REWEAR DZ</title>
  <link rel="stylesheet" href="../styles/index.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .fav-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #d4a574, #f4e5c2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .back-link {
      font-size: 0.85rem;
      color: #c89b5f;
      text-decoration: none;
    }
    .back-link:hover { color: #f4e5c2; }

    /* ── GRID ── */
    .favorites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }
    .fav-card {
      background: rgba(61, 40, 23, 0.75);
      border: 1px solid rgba(212, 165, 116, 0.18);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      backdrop-filter: blur(6px);
    }
    .fav-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .fav-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .fav-card-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: rgba(81,54,32,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    .fav-card-body {
      padding: 0.75rem;
    }
    .fav-card-body h4 {
      font-size: 0.88rem;
      font-weight: 700;
      color: #f4e5c2;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fav-card-body .fav-etat {
      font-size: 0.75rem;
      color: #c89b5f;
      margin-bottom: 0.3rem;
    }
    .fav-card-body .fav-price {
      font-size: 0.95rem;
      font-weight: 800;
      color: #d4a574;
    }
    .btn-unfav {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(61,40,23,0.88);
      border: 1px solid rgba(220,80,80,0.4);
      color: #e07070;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }
    .btn-unfav:hover { background: rgba(220,80,80,0.25); transform: scale(1.1); }

    /* ── EMPTY ── */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: #a07850;
      display: none;
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.9rem; margin-bottom: 1.25rem; }
    .btn-browse {
      padding: 0.6rem 1.5rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #d4a574, #f4e5c2);
      color: #3d2817;
      font-weight: 700;
      font-size: 0.85rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    /* ── LOADING ── */
    .loading-state {
      text-align: center;
      color: #c89b5f;
      padding: 3rem;
      font-size: 0.9rem;
    }

    /* ── COUNTER ── */
    .fav-count {
      font-size: 0.85rem;
      color: #c89b5f;
    }
    .fav-count span {
      color: #d4a574;
      font-weight: 700;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: rgba(61, 40, 23, 0.97);
      border: 1px solid rgba(212, 165, 116, 0.4);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      color: #f4e5c2;
      font-size: 0.875rem;
      font-weight: 600;
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(92,184,92,0.5); }
    .toast.error   { border-color: rgba(220,80,80,0.5); color: #e07070; }

    @media (max-width: 480px) {
      .favorites-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <a href="../index.html" class="logo gradient-text">REWEAR DZ</a>
    <div class="nav-right">
      <a href="profile.html" class="nav-btn">👤 Mon profil</a>
    </div>
  </header>

  <div class="fav-wrap">

    <div>
      <a href="profile.html" class="back-link">← Retour au profil</a>
    </div>

    <div class="page-header">
      <h1>❤️ Mes favoris</h1>
      <div class="fav-count">Total : <span id="favCount">—</span></div>
    </div>

    <div id="favGrid" class="favorites-grid">
      <div class="loading-state" style="grid-column:1/-1">Chargement de vos favoris...</div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">❤️</div>
      <p>Vous n'avez pas encore de favoris.<br>Explorez les annonces et ajoutez-en !</p>
      <a href="../index.html" class="btn-browse">Parcourir les annonces</a>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="../script/favorites.js"></script>
</body>
</html>
