<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - REWEAR DZ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at top right, #EADBC8, #3E2A1F);
      color: #f4e5c2; min-height: 100vh;
    }
    .top-bar {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: #3E2A1F;
      border-bottom: 1px solid rgba(212,165,116,0.2);
      position: sticky; top: 0; z-index: 10;
    }
    .btn-back {
      background: none; border: none;
      color: #d4a574; font-size: 1.3rem;
      cursor: pointer; padding: 0.25rem;
    }
    .top-bar h1 {
      font-size: 1rem; font-weight: 700;
      background: linear-gradient(135deg, #d4a574, #f4e5c2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .conv-list { max-width: 600px; margin: 0 auto; padding: 0.5rem 0; }
    .conv-item {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid rgba(212,165,116,0.1);
      cursor: pointer; transition: background 0.15s;
    }
    .conv-item:hover { background: rgba(81,54,32,0.4); }
    .conv-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: linear-gradient(135deg, #d4a574, #f4e5c2);
      color: #3d2817; font-weight: 800; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; position: relative;
    }
    .unread-dot {
      position: absolute; top: 0; right: 0;
      width: 12px; height: 12px; border-radius: 50%;
      background: #d4a574;
      border: 2px solid #3E2A1F;
    }
    .conv-thumb {
      width: 38px; height: 38px; border-radius: 6px;
      object-fit: cover;
      border: 1px solid rgba(212,165,116,0.25);
      flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-who {
      font-size: 0.9rem; font-weight: 700; color: #f4e5c2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-article {
      font-size: 0.75rem; color: #d4a574;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-last {
      font-size: 0.78rem; color: #a07850;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 0.1rem;
    }
    .conv-last.unread { color: #f4e5c2; font-weight: 600; }
    .conv-time {
      font-size: 0.72rem; color: #a07850;
      flex-shrink: 0; text-align: right;
    }
    .empty-state {
      text-align: center; padding: 3rem 1rem; color: #a07850;
    }
    .empty-state p { margin-bottom: 1rem; }
    .empty-state a {
      padding: 0.6rem 1.5rem;
      background: linear-gradient(135deg, #d4a574, #f4e5c2);
      border-radius: 999px; color: #3d2817;
      font-weight: 700; text-decoration: none;
    }
    .loading { text-align: center; padding: 2rem; color: #c89b5f; }
  </style>
</head>
<body>

<div class="top-bar">
  <button class="btn-back" onclick="window.location.href='../index.html'">&#8592;</button>
  <h1>Mes messages</h1>
</div>

<div class="conv-list" id="convList">
  <div class="loading">Chargement...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(async function() {
  var SUPABASE_URL = 'https://eviqzvrwjxmhwsylswqi.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2aXF6dnJ3anhtaHdzeWxzd3FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mzk3ODAsImV4cCI6MjA4OTAxNTc4MH0.8N-e6_OHRseAZ9PvAjDV7vspJsj2qDHk6bjLfz21BZ0';
  var client = window.supabaseClient || supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  window.supabaseClient = client;

  var { data: { user } } = await client.auth.getUser();
  var list = document.getElementById('convList');

  if (!user) {
    list.innerHTML = '<div class="empty-state"><p>Connectez-vous pour voir vos messages.</p><a href="login.html">Se connecter</a></div>';
    return;
  }

  var myId = user.id;

  /* Charger tous mes messages, groupés par (article_id + autre_personne) */
  var { data: msgs, error } = await client.from('messages')
    .select('*, article:articles(id,title,images,price), sender:profiles!sender_id(id,username), receiver:profiles!receiver_id(id,username)')
    .or('sender_id.eq.' + myId + ',receiver_id.eq.' + myId)
    .order('created_at', { ascending: false });

  if (error || !msgs || msgs.length === 0) {
    list.innerHTML = '<div class="empty-state"><p>Aucun message pour le moment.</p><a href="../index.html">Parcourir les annonces</a></div>';
    return;
  }

  /* Grouper par clé unique article_id + other_user_id */
  var convMap = {};
  msgs.forEach(function(m) {
    var otherId = m.sender_id === myId ? m.receiver_id : m.sender_id;
    var key = (m.article_id || 'no-art') + '_' + otherId;
    if (!convMap[key]) {
      convMap[key] = {
        articleId:   m.article_id,
        otherId:     otherId,
        otherName:   m.sender_id === myId ? (m.receiver && m.receiver.username) : (m.sender && m.sender.username),
        article:     m.article,
        lastMsg:     m,
        unread:      0
      };
    }
    /* Compter non lus */
    if (m.receiver_id === myId && !m.read) convMap[key].unread++;
  });

  var convs = Object.values(convMap);
  list.innerHTML = '';

  convs.forEach(function(c) {
    var item = document.createElement('div');
    item.className = 'conv-item';

    var initial = (c.otherName || '?')[0].toUpperCase();
    var imgHtml = (c.article && c.article.images && c.article.images[0])
      ? '<img class="conv-thumb" src="' + c.article.images[0] + '" alt="">'
      : '';

    var lastContent = c.lastMsg.content || '';
    if (lastContent.length > 45) lastContent = lastContent.slice(0, 45) + '...';

    var time = new Date(c.lastMsg.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

    item.innerHTML =
      '<div class="conv-avatar">' + initial + (c.unread > 0 ? '<span class="unread-dot"></span>' : '') + '</div>' +
      imgHtml +
      '<div class="conv-info">' +
        '<div class="conv-who">' + (c.otherName || 'Utilisateur') + '</div>' +
        (c.article ? '<div class="conv-article">' + (c.article.title || '') + '</div>' : '') +
        '<div class="conv-last' + (c.unread > 0 ? ' unread' : '') + '">' + lastContent + '</div>' +
      '</div>' +
      '<div class="conv-time">' + time + '</div>';

    item.addEventListener('click', function() {
      window.location.href = 'chat.html?article_id=' + c.articleId + '&seller_id=' + c.otherId;
    });

    list.appendChild(item);
  });

})();
</script>
</body>
</html>
