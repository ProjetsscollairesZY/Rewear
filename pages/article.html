<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - REWEAR DZ</title>
  <link rel="stylesheet" href="../styles/index.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles/article.css">
</head>
<body>

  <header>
    <div class="logo gradient-text">REWEAR DZ</div>
    <div class="nav-right">
      <div class="only-guest" id="guest-nav">
        <a href="login.html" class="nav-btn">Se connecter</a>
        <a href="signin.html" class="nav-btn btn-primary">S'inscrire</a>
      </div>
      <div class="only-auth" id="auth-nav">
        <a href="../roles/vendeur/publier.html" class="btn-publish">+ Publier</a>
        <div class="user-menu">
          <div class="user-avatar" id="avatar-btn">?</div>
          <div class="dropdown" id="dropdown">
            <div class="dropdown-header">
              <div class="username" id="dd-username">Chargement…</div>
            </div>
            <a href="profile.html"><span class="icon">👤</span> Mon profil</a>
            <a href="myarticles.html"><span class="icon">📦</span> Mes annonces</a>
         
            <button class="dd-item logout-btn" id="logout-btn">
              <span class="icon">🚪</span> Se déconnecter
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="detail-wrap" id="detailWrap">
    <div class="page-loading" id="pageLoading">Chargement de l'article...</div>
  </div>

  <!-- Interest Modal -->
  <div class="modal-overlay" id="interestModal">
    <div class="modal">
      <h3>🛒 Signaler votre intérêt</h3>
      <div class="modal-field">
        <label>Votre nom *</label>
        <input type="text" id="intName" placeholder="Prénom Nom" maxlength="80">
      </div>
      <div class="modal-field">
        <label>Téléphone *</label>
        <input type="tel" id="intPhone" placeholder="0555 12 34 56" maxlength="20">
      </div>
      <div class="modal-field">
        <label>Email (optionnel)</label>
        <input type="email" id="intEmail" placeholder="votre@email.com">
      </div>
      <div class="modal-field">
        <label>Message (optionnel)</label>
        <textarea id="intMessage" placeholder="Votre message au vendeur..."></textarea>
      </div>
      <p class="modal-error" id="intError"></p>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="intCancel">Annuler</button>
        <button class="btn-modal-send" id="intSend">Envoyer</button>
      </div>
    </div>
  </div>
<!-- Report Modal -->
<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <h3>🚩 Signaler ce vendeur</h3>
    <div class="modal-field">
      <label>Motif *</label>
      <select id="repExcuse" style="width:100%;padding:0.6rem 0.85rem;border-radius:8px;border:1px solid rgba(212,165,116,0.3);background:rgb(86, 49, 21);color:#f4dba2;font-size:0.88rem;outline:none;font-family:inherit;">
        <option value="">-- Choisir un motif --</option>
        <option value="arnaque">Arnaque / Fraude</option>
        <option value="faux_article">Article faux ou mal décrit</option>
        <option value="comportement">Comportement inapproprié</option>
        <option value="spam">Spam</option>
        <option value="autre">Autre</option>
      </select>
    </div>

    <div class="modal-field">
      <label>Commentaire (optionnel)</label>
      <textarea id="repComment" placeholder="Décrivez le problème..." style="width:100%;padding:0.6rem 0.85rem;border-radius:8px;border:1px solid rgba(212,165,116,0.3);background:rgba(255,255,255,0.06);color:#f4e5c2;font-size:0.88rem;resize:vertical;min-height:80px;outline:none;font-family:inherit;"></textarea>
    </div>
    <p class="modal-error" id="repError"></p>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="repCancel">Annuler</button>
      <button class="btn-modal-send" id="repSend" style="background:linear-gradient(135deg,#e07070,#f4a0a0);color:#3d1717;">Signaler</button>
    </div>
    
  </div>
 
</div>


  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="../script/auth.js"></script>
  <script>
  (function () {
    var SUPABASE_URL = 'https://eviqzvrwjxmhwsylswqi.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2aXF6dnJ3anhtaHdzeWxzd3FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mzk3ODAsImV4cCI6MjA4OTAxNTc4MH0.8N-e6_OHRseAZ9PvAjDV7vspJsj2qDHk6bjLfz21BZ0';
    var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var params    = new URLSearchParams(window.location.search);
    var articleId = params.get('id');
    var wrap      = document.getElementById('detailWrap');
    var loading   = document.getElementById('pageLoading');

   
    /* ── Helpers ── */
function esc(s) { return (String(s||'')).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }    function initials(n) {
      if (!n) return '?';
      var p = n.trim().split(' ');
      return p.length >= 2 ? (p[0][0]+p[1][0]).toUpperCase() : n[0].toUpperCase();
    }
    function safeUrl(val, prefix) {
      if (!val) return '';
      val = val.trim();
      return val.startsWith('http') ? val : prefix + val;
    }
    function starsHtml(n, total) {
      total = total || 5;
      var s = '';
      for (var i = 1; i <= total; i++) s += i <= Math.round(n) ? '★' : '☆';
      return s;
    }
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + (type || '');
      setTimeout(function() { t.className = 'toast'; }, 3000);
    }

    if (!articleId) {
      loading.className = 'page-error';
      loading.textContent = 'Article introuvable.';
      return;
    }

   

client.auth.getSession().then(function(sessionResult) {
  var session = sessionResult.data.session;
  var currentUser = session ? session.user : null;

  // ── 1. Fetch article ──
  client.from('articles')
    .select('id,title,description,price,etat,taille,wilaya,images,category_id,created_at,seller_id')
    .eq('id', articleId).eq('is_active', true).single()
    .then(function(r) {
    if (r.error || !r.data) {
  window.location.href = 'errarticle.html';
  return;
}
      var article = r.data;

      // ── 2. Fetch seller + reviews ──
      Promise.all([
        client.from('profiles').select('username,phone,instagram,facebook').eq('id', article.seller_id).maybeSingle(),
        client.from('seller_reviews').select('id,rating,comment,created_at,author_id').eq('seller_id', article.seller_id).order('created_at', { ascending: false }),
        currentUser
          ? client.from('favorites').select('id').eq('user_id', currentUser.id).eq('article_id', articleId).maybeSingle()
          : Promise.resolve({ data: null })
      ]).then(function(results) {
        var profile = (results[0].data) || {};
        var reviews = (results[1].data) || [];
        var isFav   = !!(results[2].data);
        render(article, profile, reviews, isFav, currentUser); // ← passer currentUser
      });
    });
});
    /* ── RENDER ── */
    function render(a, profile, reviews, isFav,currentUser) {
      loading.remove();

      /* Back */
      var backEl = document.createElement('a');
      backEl.href = '../index.html';
      backEl.className = 'back-link';
      backEl.textContent = '← Retour aux annonces';
      wrap.appendChild(backEl);

      /* Gallery */
      var images  = (a.images && a.images.length > 0) ? a.images : [];
      var mainSrc = images[0] || '';
      var thumbsHtml = '';
      if (images.length > 1) {
        images.forEach(function(src, i) {
          thumbsHtml += '<img src="'+src+'" class="'+(i===0?'active':'')+'" data-src="'+src+'" alt="">';
        });
      }

      /* Badges */
      var badges = '';
      if (a.etat)   badges += '<span class="badge">🏷️ '+esc(a.etat)+'</span>';
      if (a.taille) badges += '<span class="badge">📏 '+esc(a.taille)+'</span>';
      if (a.wilaya) badges += '<span class="badge">📍 '+esc(a.wilaya)+'</span>';

      var date = a.created_at
        ? new Date(a.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})
        : '';

      /* Seller contacts */
      var sellerName = profile.username || 'Vendeur';
      var contacts = '';
      if (profile.phone)     contacts += '<a class="contact-chip" href="tel:'+profile.phone+'">📞 '+esc(profile.phone)+'</a>';
      if (profile.instagram) {
        var h = profile.instagram.replace(/^@/,'');
        contacts += '<a class="contact-chip insta" href="'+safeUrl(h,'https://instagram.com/')+'" target="_blank" rel="noopener">📸 @'+esc(h)+'</a>';
      }
      if (profile.facebook)  contacts += '<a class="contact-chip fb" href="'+safeUrl(profile.facebook,'https://facebook.com/')+'" target="_blank" rel="noopener">🔵 '+esc(profile.facebook.replace(/^@/,''))+'</a>';
      if (!contacts)         contacts  = '<span class="contact-chip no-contact">Aucun contact renseigné</span>';

      /* Rating */
      var avgRating = 0, ratingHtml = '';
      if (reviews.length > 0) {
        avgRating = reviews.reduce(function(s,r){return s+r.rating;},0) / reviews.length;
        ratingHtml =
          '<div class="seller-rating-line">' +
            '<span class="stars-display">'+starsHtml(avgRating)+'</span>' +
            '<span class="rating-avg">'+avgRating.toFixed(1)+'/5</span>' +
            '<span class="rating-count">('+reviews.length+' avis)</span>' +
          '</div>';
      } else {
        ratingHtml = '<div class="seller-rating-line"><span class="rating-count">Aucun avis pour l\'instant</span></div>';
      }

  /* Fav button (only if logged in and not own article) */
var favBtnHtml = '';
var isOwn = currentUser && currentUser.id === a.seller_id;
if (currentUser && !isOwn) {
  favBtnHtml = '<button class="btn-fav" id="btnFav" title="'+(isFav?'Retirer des favoris':'Ajouter aux favoris')+'">'+(isFav?'❤️':'🤍')+'</button>';
}

/* Interest button */
var interestBtn = isOwn
  ? ''
  : '<button class="btn-interest" id="btnInterest">🛒 Je suis intéressé(e)</button>';

/* Report button */
var reportBtn = isOwn
  ? ''
  : '<button class="btn-report" id="btnReport">🚩 Signaler le vendeur</button>';

var card = document.createElement('div');
card.className = 'detail-card';
card.innerHTML =
  '<div class="gallery">' +
    (mainSrc
      ? '<img class="gallery-main" id="galleryMain" src="'+mainSrc+'" alt="'+esc(a.title)+'">'
      : '<div class="gallery-main" style="display:flex;align-items:center;justify-content:center;font-size:3rem;">📦</div>') +
    favBtnHtml +
    (thumbsHtml ? '<div class="gallery-thumbs" id="galleryThumbs">'+thumbsHtml+'</div>' : '') +
  '</div>' +
  '<div class="detail-info">' +
    '<h1>'+esc(a.title)+'</h1>' +
    '<div class="detail-price">'+Number(a.price||0).toLocaleString('fr-DZ')+' DA</div>' +
    '<div class="detail-badges">'+badges+'</div>' +
    (date ? '<div style="font-size:0.78rem;color:#a07850;">Publié le '+date+'</div>' : '') +
    '<hr class="detail-divider">' +
    '<p class="detail-desc">'+esc(a.description||'Aucune description.')+'</p>' +
    '<div class="action-btns">'+interestBtn+reportBtn+'</div>' +
  '</div>';
wrap.appendChild(card);

      /* Seller card */
      var sellerEl = document.createElement('div');
      sellerEl.className = 'seller-card';
      sellerEl.innerHTML =
        '<div class="seller-avatar">'+initials(sellerName)+'</div>' +
        '<div class="seller-info">' +
          '<h3>'+esc(sellerName)+'</h3>' +
          ratingHtml +
          '<div class="seller-label">Vendeur REWEAR DZ</div>' +
          '<div class="seller-contacts">'+contacts+'</div>' +
        '</div>';
      wrap.appendChild(sellerEl);

      /* Reviews section */
      var reviewsEl = document.createElement('div');
      reviewsEl.className = 'reviews-section';

      var canReview = currentUser && !isOwn;
      reviewsEl.innerHTML =
        '<div class="reviews-header">' +
          '<h2>⭐ Avis sur le vendeur</h2>' +
          (canReview ? '<button class="btn-review" id="btnOpenReview">+ Laisser un avis</button>' : '') +
        '</div>' +
        '<div class="reviews-list" id="reviewsList"></div>' +
        (canReview ?
          '<div class="review-form-wrap" id="reviewForm">' +
            '<h3>Votre avis</h3>' +
            '<div class="star-picker" id="starPicker">' +
              '<span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>' +
            '</div>' +
            '<textarea id="reviewComment" placeholder="Votre commentaire (optionnel)..."></textarea>' +
            '<p class="review-error" id="reviewError"></p>' +
            '<div class="review-form-actions">' +
              '<button class="btn-submit-review" id="btnSubmitReview">Publier</button>' +
              '<button class="btn-cancel-review" id="btnCancelReview">Annuler</button>' +
            '</div>' +
          '</div>'
        : '');
      wrap.appendChild(reviewsEl);

      /* Fill reviews list */
      renderReviews(reviews);

      /* ── EVENTS ── */

      /* Gallery thumbs */
      var mainImg  = document.getElementById('galleryMain');
      var thumbsEl = document.getElementById('galleryThumbs');
      if (mainImg && thumbsEl) {
        thumbsEl.querySelectorAll('img').forEach(function(thumb) {
          thumb.addEventListener('click', function() {
            mainImg.src = thumb.getAttribute('data-src');
            thumbsEl.querySelectorAll('img').forEach(function(t){t.classList.remove('active');});
            thumb.classList.add('active');
          });
        });
      }

      /* Fav button */
      var btnFav = document.getElementById('btnFav');
      if (btnFav) {
        var favActive = isFav;
        btnFav.addEventListener('click', function() {
          if (!currentUser) { showToast('Connectez-vous pour ajouter aux favoris.', 'error'); return; }
          if (favActive) {
            client.from('favorites').delete().eq('user_id', currentUser.id).eq('article_id', articleId)
              .then(function(r) {
                if (r.error) { showToast('Erreur.', 'error'); return; }
                favActive = false;
                btnFav.textContent = '🤍';
                btnFav.title = 'Ajouter aux favoris';
                showToast('Retiré des favoris.', 'success');
              });
          } else {
            client.from('favorites').insert({ user_id: currentUser.id, article_id: articleId })
              .then(function(r) {
                if (r.error) { showToast('Erreur.', 'error'); return; }
                favActive = true;
                btnFav.textContent = '❤️';
                btnFav.title = 'Retirer des favoris';
                showToast('Ajouté aux favoris !', 'success');
              });
          }
        });
      }

      /* Interest modal */
      var interestModal = document.getElementById('interestModal');
      var btnInterest   = document.getElementById('btnInterest');
      if (btnInterest) {
        btnInterest.addEventListener('click', function() {
          if (!currentUser) {
            /* Pre-fill nothing, open anyway */
          }
          interestModal.classList.add('open');
        });
      }
      document.getElementById('intCancel').addEventListener('click', function() {
        interestModal.classList.remove('open');
      });
      interestModal.addEventListener('click', function(e) {
        if (e.target === interestModal) interestModal.classList.remove('open');
      });
      document.getElementById('intSend').addEventListener('click', function() {
        var name  = document.getElementById('intName').value.trim();
        var phone = document.getElementById('intPhone').value.trim();
        var email = document.getElementById('intEmail').value.trim();
        var msg   = document.getElementById('intMessage').value.trim();
        var errEl = document.getElementById('intError');

        if (!name || !phone) {
          errEl.textContent = 'Le nom et le téléphone sont requis.';
          errEl.style.display = 'block';
          return;
        }
        errEl.style.display = 'none';
        var sendBtn = document.getElementById('intSend');
        sendBtn.disabled = true; sendBtn.textContent = 'Envoi...';

        client.from('purchase_interest').insert({
          article_id:  articleId,
          buyer_id:    currentUser ? currentUser.id : null,
          buyer_name:  name,
          buyer_phone: phone,
          buyer_email: email || null,
          message:     msg   || null
        }).then(function(r) {
          sendBtn.disabled = false; sendBtn.textContent = 'Envoyer';
          if (r.error) { errEl.textContent = 'Erreur : '+r.error.message; errEl.style.display='block'; return; }
          interestModal.classList.remove('open');
          showToast('Intérêt enregistré ! Le vendeur vous contactera.', 'success');
          if (btnInterest) { btnInterest.disabled = true; btnInterest.textContent = '✅ Intérêt envoyé'; }
        });
      });
/* Report modal */
var reportModal = document.getElementById('reportModal');
var btnReport   = document.getElementById('btnReport');

if (btnReport) {
  btnReport.addEventListener('click', function() {
    if (!currentUser) {
      showToast('Connectez-vous pour signaler.', 'error');
      return;
    }
    reportModal.classList.add('open');
  });
}

document.getElementById('repCancel').addEventListener('click', function() {
  reportModal.classList.remove('open');
});

reportModal.addEventListener('click', function(e) {
  if (e.target === reportModal) reportModal.classList.remove('open');
});

document.getElementById('repSend').addEventListener('click', function() {
  var excuse  = document.getElementById('repExcuse').value;
  var comment = document.getElementById('repComment').value.trim();
  var errEl   = document.getElementById('repError');
  var sendBtn = document.getElementById('repSend');

  if (!excuse) {
    errEl.textContent = 'Choisissez un motif.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';
  sendBtn.disabled = true;
  sendBtn.textContent = 'Envoi...';

  client.from('seller_signalements').insert({
    seller_id: a.seller_id,
    author_id: currentUser.id,
    excuse:    excuse,
    comment:   comment || null
  }).then(function(r) {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Signaler';
    if (r.error) {
      errEl.textContent = 'Erreur : ' + r.error.message;
      errEl.style.display = 'block';
      return;
    }
    reportModal.classList.remove('open');
    showToast('Signalement envoyé. Merci !', 'success');
    // Reset form
    document.getElementById('repExcuse').value = '';
    document.getElementById('repComment').value = '';
  });
});
      /* Review form */
      var btnOpenReview   = document.getElementById('btnOpenReview');
      var reviewForm      = document.getElementById('reviewForm');
      var btnCancelReview = document.getElementById('btnCancelReview');
      var btnSubmitReview = document.getElementById('btnSubmitReview');
      var starPicker      = document.getElementById('starPicker');
      var selectedRating  = 0;

      if (btnOpenReview) {
        btnOpenReview.addEventListener('click', function() {
          reviewForm.classList.toggle('open');
        });
      }
      if (btnCancelReview) {
        btnCancelReview.addEventListener('click', function() {
          reviewForm.classList.remove('open');
        });
      }

      /* Star picker */
      if (starPicker) {
        var stars = starPicker.querySelectorAll('span');
        stars.forEach(function(star) {
          star.addEventListener('mouseenter', function() {
            var v = parseInt(star.getAttribute('data-v'));
            stars.forEach(function(s) { s.classList.toggle('on', parseInt(s.getAttribute('data-v')) <= v); });
          });
          star.addEventListener('mouseleave', function() {
            stars.forEach(function(s) { s.classList.toggle('on', parseInt(s.getAttribute('data-v')) <= selectedRating); });
          });
          star.addEventListener('click', function() {
            selectedRating = parseInt(star.getAttribute('data-v'));
            stars.forEach(function(s) { s.classList.toggle('on', parseInt(s.getAttribute('data-v')) <= selectedRating); });
          });
        });
      }

      if (btnSubmitReview) {
  btnSubmitReview.addEventListener('click', function() {
    var comment = document.getElementById('reviewComment').value.trim();
    var errEl   = document.getElementById('reviewError');
    if (!currentUser) { errEl.textContent='Connectez-vous.'; errEl.style.display='block'; return; }
    if (selectedRating === 0) { errEl.textContent='Choisissez une note.'; errEl.style.display='block'; return; }
    errEl.style.display = 'none';
    btnSubmitReview.disabled = true; btnSubmitReview.textContent = 'Envoi...';

    // Vérifier si l'utilisateur a déjà laissé un avis
    client.from('seller_reviews')
      .select('id')
      .eq('author_id', currentUser.id)
      .eq('seller_id', a.seller_id)
      .maybeSingle()
      .then(function(check) {
        if (check.data) {
          // Déjà un avis → proposer de modifier
          errEl.textContent = 'Vous avez déjà laissé un avis pour ce vendeur.';
          errEl.style.display = 'block';
          btnSubmitReview.disabled = false;
          btnSubmitReview.textContent = 'Publier';
          return;
        }

        // Pas encore d'avis → insérer
        client.from('seller_reviews').insert({
          seller_id: a.seller_id,
          author_id: currentUser.id,
          rating:    selectedRating,
          comment:   comment || null
        }).then(function(r) {
          btnSubmitReview.disabled = false; btnSubmitReview.textContent = 'Publier';
          if (r.error) {
            errEl.textContent = r.error.code === '23505'
              ? 'Vous avez déjà laissé un avis pour ce vendeur.'
              : 'Erreur : ' + r.error.message;
            errEl.style.display = 'block';
            return;
          }
          showToast('Avis publié !', 'success');
          reviewForm.classList.remove('open');
          // Cacher le bouton "Laisser un avis" pour cette session
          if (btnOpenReview) {
            btnOpenReview.textContent = '✅ Avis déjà laissé';
            btnOpenReview.disabled = true;
          }
          // Recharger les avis
          client.from('seller_reviews')
            .select('id,rating,comment,created_at,author_id')
            .eq('seller_id', a.seller_id)
            .order('created_at', { ascending: false })
            .then(function(rv) {
              var newReviews = rv.data || [];
              renderReviews(newReviews);
              if (newReviews.length > 0) {
                var avg = newReviews.reduce(function(s,x){return s+x.rating;},0)/newReviews.length;
                var rl = sellerEl.querySelector('.seller-rating-line');
                if (rl) rl.innerHTML =
                  '<span class="stars-display">'+starsHtml(avg)+'</span>' +
                  '<span class="rating-avg">'+avg.toFixed(1)+'/5</span>' +
                  '<span class="rating-count">('+newReviews.length+' avis)</span>';
              }
            });
        });
      });
  });
}
    } /* end render */

    /* ── Render reviews list ── */
    function renderReviews(reviews) {
      var list = document.getElementById('reviewsList');
      if (!list) return;
      if (reviews.length === 0) {
        list.innerHTML = '<div class="reviews-empty">Aucun avis pour le moment. Soyez le premier !</div>';
        return;
      }
      list.innerHTML = '';
      reviews.forEach(function(rv) {
        var date = rv.created_at
          ? new Date(rv.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})
          : '';
        var item = document.createElement('div');
        item.className = 'review-item';
        item.innerHTML =
          '<div class="review-top">' +
            '<span class="review-author">Acheteur</span>' +
            '<span class="review-stars">'+starsHtml(rv.rating)+'</span>' +
            (date ? '<span class="review-date">'+date+'</span>' : '') +
          '</div>' +
          (rv.comment ? '<div class="review-comment">'+esc(rv.comment)+'</div>' : '');
        list.appendChild(item);
      });
    }

  })();
   
  </script>
</body>
</html>
