<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publier une annonce - REWEAR DZ</title>
  <link rel="stylesheet" href="../../styles/publier.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="publier-wrap">
    <a href="../../index.html" class="back-link">← Retour à l'accueil</a>
    <h1 class="pub">Publier une annonce</h1>
    <p id="pageError" class="form-error" style="display:none;"></p>
    <div class="form-box">
      <form id="publierForm">
        <div class="form-group">
          <label for="title">Titre *</label>
          <input type="text" id="title" placeholder="Ex: Veste en jean vintage" required maxlength="120">
        </div>
        <div class="form-group">
          <label for="description">Description détaillée *</label>
          <textarea id="description" placeholder="Décrivez l'article, l'état, les défauts éventuels..." required></textarea>
        </div>
        <div class="form-group">
          <label for="price">Prix (DA) *</label>
          <input type="number" id="price" placeholder="0" required min="0" step="1">
        </div>
        <div class="form-group">
          <label for="etat">État du vêtement *</label>
          <select id="etat" required>
            <option value="">Choisir</option>
            <option value="Neuf avec étiquette">Neuf avec étiquette</option>
            <option value="Neuf sans étiquette">Neuf sans étiquette</option>
            <option value="Très bon état">Très bon état</option>
            <option value="Bon état">Bon état</option>
            <option value="Correct">Correct</option>
          </select>
        </div>
        <div class="form-group">
          <label for="taille">Taille</label>
          <input type="text" id="taille" placeholder="Ex: M, 42, 36..." maxlength="20">
        </div>
        <div class="form-group">
          <label for="category_id">Catégorie</label>
          <select id="category_id">
            <option value="">— Choisir —</option>
          </select>
        </div>
        <div class="form-group">
          <label for="wilaya">Wilaya</label>
          <select id="wilaya">
            <option value="">— Choisir —</option>
            <option value="16">Alger</option>
            <option value="31">Oran</option>
            <option value="25">Constantine</option>
            <option value="09">Blida</option>
            <option value="19">Sétif</option>
            <option value="06">Béjaïa</option>
            <option value="15">Tizi Ouzou</option>
            <option value="23">Annaba</option>
            <option value="21">Skikda</option>
            <option value="35">Boumerdès</option>
          </select>
        </div>
        <div class="form-group">
          <label>Photos * (au moins une, max 10)</label>
          <p class="form-hint">Formats autorisés : JPEG, PNG, WebP. Taille max 5 Mo par image. Les images sont compressées automatiquement.</p>
          <div class="photo-zone" id="photoZone">
            <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp" multiple>
            <span id="photoZoneText">Cliquez ou glissez-déposez vos photos ici</span>
            <div class="photo-preview" id="photoPreview"></div>
          </div>
          <p id="photoError" class="form-error" style="display:none;"></p>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Publier l'annonce</button>
      </form>
      <p id="msgSuccess" class="msg-success" style="display:none;">Annonce publiée. Redirection...</p>
    </div>
  </div>
  <script src="../../script/auth.js"></script>
  <script src="../../script/articles.js"></script>
  <script>
    (function() {
      var user = (function() {
        try {
          var u = localStorage.getItem('user');
          return u ? JSON.parse(u) : null;
        } catch (e) { return null; }
      })();
      if (!user) {
        window.location.href = '../../pages/login.html?redirect=' + encodeURIComponent(window.location.pathname);
        return;
      }
      if (typeof supabase !== 'undefined') {
        window.supabaseClient = supabase.createClient(
          'https://eviqzvrwjxmhwsylswqi.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2aXF6dnJ3anhtaHdzeWxzd3FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mzk3ODAsImV4cCI6MjA4OTAxNTc4MH0.8N-e6_OHRseAZ9PvAjDV7vspJsj2qDHk6bjLfz21BZ0'
        );
      }

      var photoZone = document.getElementById('photoZone');
      var photoInput = document.getElementById('photoInput');
      var photoPreview = document.getElementById('photoPreview');
      var photoError = document.getElementById('photoError');
      var selectedFiles = [];

      function showPhotoError(msg) {
        photoError.textContent = msg || '';
        photoError.style.display = msg ? 'block' : 'none';
      }
      function renderPreviews() {
        photoPreview.innerHTML = '';
        selectedFiles.forEach(function(file, i) {
          var wrap = document.createElement('div');
          wrap.className = 'wrap';
          var img = document.createElement('img');
          img.className = 'thumb';
          img.alt = 'Preview';
          var url = URL.createObjectURL(file);
          img.src = url;
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'remove';
          btn.textContent = '×';
          btn.addEventListener('click', function() {
            selectedFiles.splice(i, 1);
            URL.revokeObjectURL(url);
            renderPreviews();
            showPhotoError('');
          });
          wrap.appendChild(img);
          wrap.appendChild(btn);
          photoPreview.appendChild(wrap);
        });
      }
      function addFiles(files) {
        var allowed = ['image/jpeg', 'image/png', 'image/webp'];
        var maxSize = 5 * 1024 * 1024;
        var maxPhotos = window.rewearArticles ? window.rewearArticles.MAX_PHOTOS : 10;
        for (var i = 0; i < files.length; i++) {
          if (selectedFiles.length >= maxPhotos) break;
          var f = files[i];
          if (allowed.indexOf(f.type) === -1) {
            showPhotoError('Format non autorisé. Utilisez JPEG, PNG ou WebP.');
            return;
          }
          if (f.size > maxSize) {
            showPhotoError('Chaque image doit faire moins de 5 Mo.');
            return;
          }
          selectedFiles.push(f);
        }
        showPhotoError('');
        renderPreviews();
      }
      photoZone.addEventListener('click', function() { photoInput.click(); });
      photoZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        photoZone.classList.add('dragover');
      });
      photoZone.addEventListener('dragleave', function() { photoZone.classList.remove('dragover'); });
      photoZone.addEventListener('drop', function(e) {
        e.preventDefault();
        photoZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
      });
      photoInput.addEventListener('change', function() {
        if (this.files.length) addFiles(this.files);
        this.value = '';
      });

      window.rewearArticles.getCategories().then(function(cats) {
        var sel = document.getElementById('category_id');
        cats.forEach(function(c) {
          var opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          sel.appendChild(opt);
        });
      });

      document.getElementById('publierForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var errEl = document.getElementById('pageError');
        var btn = document.getElementById('submitBtn');
        var msgSuccess = document.getElementById('msgSuccess');
        errEl.style.display = 'none';
        msgSuccess.style.display = 'none';
        if (selectedFiles.length === 0) {
          showPhotoError('Ajoutez au moins une photo pour votre annonce.');
          return;
        }
        btn.disabled = true;
        window.rewearArticles.uploadImages(selectedFiles)
          .then(function(urls) {
            return window.rewearArticles.createArticle({
              title: document.getElementById('title').value.trim(),
              description: document.getElementById('description').value.trim(),
              price: document.getElementById('price').value,
              etat: document.getElementById('etat').value,
              taille: document.getElementById('taille').value.trim(),
              category_id: document.getElementById('category_id').value || null,
              wilaya: document.getElementById('wilaya').value || null
            }, urls);
          })
          .then(function() {
            msgSuccess.style.display = 'block';
            msgSuccess.textContent = 'Annonce publiée avec succès. Redirection...';
            setTimeout(function() {
              window.location.href = '../../index.html';
            }, 1500);
          })
          .catch(function(err) {
            btn.disabled = false;
            var msg = err && err.message ? err.message : 'Erreur lors de la publication.';
            errEl.textContent = msg;
            errEl.style.display = 'block';
            showPhotoError(msg.indexOf('photo') !== -1 ? msg : '');
          });
      });
    })();
  </script>
</body>
</html>
