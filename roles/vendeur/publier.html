<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publier une annonce - REWEAR DZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/publier.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="publier-wrap">
    <a href="../../index.html" class="back-link">← Retour à l'accueil</a>
    <h1 class="pub">Publier une annonce</h1>
    <p id="pageError" class="form-error" style="display:none;"></p>
    <div class="form-box">
      <form id="publierForm">
        <div class="form-group">
          <label for="title">Titre *</label>
          <input type="text" id="title" placeholder="Ex: Veste en jean vintage" required maxlength="120">
        </div>
        <div class="form-group">
          <label for="description">Description détaillée *</label>
          <textarea id="description" placeholder="Décrivez l'article, l'état, les défauts éventuels..." required></textarea>
        </div>
        <div class="form-group">
          <label for="price">Prix (DA) *</label>
          <input type="number" id="price" placeholder="0" required min="0" step="1">
        </div>
        <div class="form-group">
          <label for="etat">État du vêtement *</label>
          <select id="etat" required>
            <option value="">Choisir</option>
            <option value="Neuf avec étiquette">Neuf avec étiquette</option>
            <option value="Neuf sans étiquette">Neuf sans étiquette</option>
            <option value="Très bon état">Très bon état</option>
            <option value="Bon état">Bon état</option>
            <option value="Correct">Correct</option>
          </select>
        </div>
        <div class="form-group">
          <label for="taille">Taille</label>
          <input type="text" id="taille" placeholder="Ex: M, 42, 36..." maxlength="20">
        </div>
        <div class="form-group">
          <label for="category_id">Catégorie</label>
          <select id="category_id">
            <option value="">— Choisir —</option>
          </select>
        </div>
        <div class="form-group">
          <label for="wilaya">Wilaya</label>
          <select id="wilaya">
            <option value="">— Choisir —</option>
            <option>Adrar</option><option>Chlef</option><option>Laghouat</option>
            <option>Oum El Bouaghi</option><option>Batna</option><option>Bejaia</option>
            <option>Biskra</option><option>Bechar</option><option>Blida</option>
            <option>Bouira</option><option>Tamanrasset</option><option>Tebessa</option>
            <option>Tlemcen</option><option>Tiaret</option><option>Tizi Ouzou</option>
            <option>Alger</option><option>Djelfa</option><option>Jijel</option>
            <option>Setif</option><option>Saida</option><option>Skikda</option>
            <option>Sidi Bel Abbes</option><option>Annaba</option><option>Guelma</option>
            <option>Constantine</option><option>Medea</option><option>Mostaganem</option>
            <option>M'Sila</option><option>Mascara</option><option>Ouargla</option>
            <option>Oran</option><option>El Bayadh</option><option>Illizi</option>
            <option>Bordj Bou Arreridj</option><option>Boumerdes</option><option>El Tarf</option>
            <option>Tindouf</option><option>Tissemsilt</option><option>El Oued</option>
            <option>Khenchela</option><option>Souk Ahras</option><option>Tipaza</option>
            <option>Mila</option><option>Ain Defla</option><option>Naama</option>
            <option>Ain Temouchent</option><option>Ghardaia</option><option>Relizane</option>
            <option>Timimoun</option><option>Bordj Badji Mokhtar</option>
            <option>Ouled Djellal</option><option>Beni Abbes</option><option>In Salah</option>
            <option>In Guezzam</option><option>Touggourt</option><option>Djanet</option>
            <option>El M'Ghair</option><option>El Meniaa</option>
          </select>
        </div>
        <div class="form-group">
          <label>Photos * (au moins une, max 10)</label>
          <p class="form-hint">Formats autorisés : JPEG, PNG, WebP. Taille max 5 Mo par image. Les images sont compressées automatiquement.</p>
          <div class="photo-zone" id="photoZone">
            <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp" multiple>
            <span id="photoZoneText">Cliquez ou glissez-déposez vos photos ici</span>
            <div class="photo-preview" id="photoPreview"></div>
          </div>
          <p id="photoError" class="form-error" style="display:none;"></p>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Publier l'annonce</button>
      </form>
      <p id="msgSuccess" class="msg-success" style="display:none;">Annonce publiée. Redirection...</p>
    </div>
  </div>
  <script src="../../script/auth.js"></script>
  <script src="../../script/articles.js"></script>
  <script src="../../script/publier.js"></script>
</body>
</html>
